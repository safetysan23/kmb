<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>附近城巴巴士站及抵達時間 (ETA)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #0044bb;
            font-size: 24px;
        }
        .status {
            text-align: center;
            background-color: #e1f5fe;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .stop-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .stop-name {
            font-size: 18px;
            font-weight: bold;
            color: #222;
            border-bottom: 2px solid #ffd100; /* 城巴黃 */
            padding-bottom: 5px;
            margin-bottom: 10px;
        }
        .eta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .eta-row:last-child {
            border-bottom: none;
        }
        .bus-route {
            background-color: #0044bb; /* 城巴藍 */
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: bold;
            min-width: 45px;
            text-align: center;
        }
        .bus-dest {
            flex-grow: 1;
            margin-left: 12px;
            font-size: 15px;
        }
        .bus-time {
            font-weight: bold;
            color: #e53935;
        }
        .loading-eta {
            color: #888;
            font-style: italic;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>城巴附近巴士站 ETA</h1>
    <div id="status" class="status">正在獲取您的 GPS 位置...</div>
    <div id="stops-container"></div>
</div>

<script>
// 地球半徑 (千米)，用來計算距離
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371; 
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c; 
}

// 1. 獲取用戶位置
if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
        position => {
            const userLat = position.coords.latitude;
            const userLng = position.coords.longitude;
            document.getElementById('status').innerText = `已成功定位，正在尋找 500 米內的城巴站...`;
            fetchNearbyStops(userLat, userLng);
        },
        error => {
            document.getElementById('status').innerText = `定位失敗: ${error.message}。請確保已開啟 GPS 並允許權限。`;
        }
    );
} else {
    document.getElementById('status').innerText = "您的瀏覽器不支援 GPS 定位。";
}

// 2. 獲取所有城巴車站並篩選附近的站
async function fetchNearbyStops(userLat, userLng) {
    try {
        // 讀取政府開放數據的城巴車站列表 (由於全港車站多，載入需時約 2-3 秒)
        const response = await fetch('https://rt.data.gov.hk/v1.1/transport/citybus-nwfb/stop/CTB');
        const data = await response.json();
        
        let nearbyStops = [];
        
        // 篩選出距離用戶 0.5 公里 (500米) 內的車站
        data.data.forEach(stop => {
            const distance = getDistance(userLat, userLng, parseFloat(stop.lat), parseFloat(stop.long));
            if (distance <= 0.5) { 
                nearbyStops.push({
                    stopId: stop.stop,
                    name: stop.name_tc,
                    distance: distance
                });
            }
        });

        // 按距離由近到遠排序
        nearbyStops.sort((a, b) => a.distance - b.distance);

        // 如果找不到附近的站
        if (nearbyStops.length === 0) {
            document.getElementById('status').innerText = "方圓 500 米內找不到城巴車站。";
            return;
        }

        document.getElementById('status').innerText = `搵到 ${nearbyStops.length} 個附近車站，正在即時查詢車次...`;
        renderStops(nearbyStops);

    } catch (e) {
        document.getElementById('status').innerText = "讀取巴士站數據出錯，請稍後重試。";
        console.error(e);
    }
}

// 3. 渲染車站畫面並動態載入每條線路的 ETA
function renderStops(stops) {
    const container = document.getElementById('stops-container');
    container.innerHTML = '';

    stops.forEach(stop => {
        const stopDiv = document.createElement('div');
        stopDiv.className = 'stop-card';
        
        const distMeters = Math.round(stop.distance * 1000);
        stopDiv.innerHTML = `
            <div class="stop-name">${stop.name} <span style="font-size:12px; color:#666;">(約 ${distMeters} 米)</span></div>
            <div id="eta-${stop.stopId}" class="loading-eta">正在查詢此站的所有路線預計到站時間...</div>
        `;
        container.appendChild(stopDiv);

        // 異步獲取該車站的 ETA
        fetchETA(stop.stopId);
    });
}

// 4. 查詢特定車站的 ETA
async function fetchETA(stopId) {
    const etaElement = document.getElementById(`eta-${stopId}`);
    try {
        const response = await fetch(`https://rt.data.gov.hk/v1.1/transport/citybus-nwfb/eta/CTB/${stopId}/1`);
        const data = await response.json();
        
        if (!data.data || data.data.length === 0) {
            etaElement.innerHTML = '<span style="color:#999;">目前無巴士預計到站</span>';
            return;
        }

        // 整理同一條線路的資料，只顯示最近的班次
        // API 會回傳不同路線 (route) 和目的地 (dest_tc)
        let htmlContent = '';
        
        // 過濾及排序 ETA (有時 API 會返還重覆或已過時的資料)
        const sortedEta = data.data.sort((a, b) => new Date(a.eta) - new Date(b.eta));
        
        // 用一個 Map 來防止重覆顯示太多班次，這裡設定每條線最多顯示 2 班車
        let routeCount = {};

        sortedEta.forEach(bus => {
            if (!bus.eta) return;
            
            if (!routeCount[bus.route]) routeCount[bus.route] = 0;
            if (routeCount[bus.route] >= 2) return; // 每條線只顯示頭兩班車
            
            routeCount[bus.route]++;

            // 計算剩餘分鐘
            const etaTime = new Date(bus.eta);
            const now = new Date();
            const diffMs = etaTime - now;
            const diffMins = Math.max(0, Math.floor(diffMs / 1000 / 60));
            
            let timeStr = diffMins === 0 ? "即將抵達" : `${diffMins} 分鐘`;

            htmlContent += `
                <div class="eta-row">
                    <span class="bus-route">${bus.route}</span>
                    <span class="bus-dest">往 ${bus.dest_tc}</span>
                    <span class="bus-time">${timeStr}</span>
                </div>
            `;
        });

        etaElement.innerHTML = htmlContent || '<span style="color:#999;">目前無即將抵達的班次</span>';

    } catch (e) {
        etaElement.innerHTML = '<span style="color:red;">無法載入此站的 ETA 數據</span>';
        console.error(e);
    }
}
</script>

</body>
</html>
